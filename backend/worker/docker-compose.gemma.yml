services:
  ihelpwithai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ihelpwithai-worker
    restart: unless-stopped
    # Required on the mtj Linux host so the container can call the local
    # llama-server instances bound to 127.0.0.1:8000-8003.
    network_mode: host
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /models/huggingface
      SKILLBUILDER_PROVIDER: local
      SKILLBUILDER_LOCAL_BASE_URL: http://127.0.0.1:8000/v1
      SKILLBUILDER_LOCAL_MODEL: gemma-4-12B-it-Q4_K_M.gguf
      SKILLBUILDER_MAX_VIDEO_MINUTES: ${SKILLBUILDER_MAX_VIDEO_MINUTES:-45}
      SKILLBUILDER_TRANSCRIBE_PROVIDER: ${SKILLBUILDER_TRANSCRIBE_PROVIDER:-local}
      SKILLBUILDER_LOCAL_TRANSCRIBE_MODEL: ${SKILLBUILDER_LOCAL_TRANSCRIBE_MODEL:-small.en}
      SKILLBUILDER_LOCAL_TRANSCRIBE_DEVICE: ${SKILLBUILDER_LOCAL_TRANSCRIBE_DEVICE:-cpu}
      SKILLBUILDER_LOCAL_TRANSCRIBE_COMPUTE_TYPE: ${SKILLBUILDER_LOCAL_TRANSCRIBE_COMPUTE_TYPE:-int8}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-5}
    volumes:
      - whisper-cache:/models/huggingface

volumes:
  whisper-cache:
